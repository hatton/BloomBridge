name: Build & Release Windows Installer

# Release-on-version-change. Bump the version in packages/app/package.json and
# push to master: if no release exists yet for that version, this builds the Windows
# installer and publishes a GitHub Release (creating the tag `app-v<version>`).
# If the version is unchanged, the build is skipped. `workflow_dispatch` builds a
# test installer artifact without publishing a release.
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write # create tags + releases

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      should_release: ${{ steps.v.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
      - id: v
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(node -p "require('./packages/app/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if gh release view "app-v$VERSION" >/dev/null 2>&1; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "Release app-v$VERSION already exists — skipping build."
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "Version $VERSION has no release yet — will build."
          fi

  build:
    needs: check
    # Build on a real version bump (push) or on a manual run (test build).
    if: needs.check.outputs.should_release == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install Vite+ CLI
        run: npm install -g vite-plus-cli

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        run: node packages/app/scripts/build-installer.mjs

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: BloomBridge-Setup
          path: packages/app/installer-out/BloomBridge-Setup-*.exe
          if-no-files-found: error

      - name: Publish GitHub Release
        # Only on a genuine version bump pushed to master — not on manual test builds.
        if: needs.check.outputs.should_release == 'true' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: app-v${{ needs.check.outputs.version }}
          name: BloomBridge ${{ needs.check.outputs.version }}
          generate_release_notes: true
          files: packages/app/installer-out/BloomBridge-Setup-*.exe
