name: CI

# Cheap, fast feedback on every push to master and every PR. Non-blocking by policy
# (we allow direct commits) — it just surfaces breakage. The full test suite is not
# run here because many tests require API keys / large fixtures (see CLAUDE.md);
# this checks that everything compiles and type-checks.
on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install Vite+ CLI
        run: npm install -g vite-plus-cli

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (lib → cli → gui)
        run: pnpm build

      - name: Format + lint + type-check
        run: vp check
